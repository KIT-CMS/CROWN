<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics Analysis Graph Explorer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-elk@2.1.0/dist/cytoscape-elk.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #fcfcfc; }

        /* UI Layer */
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: white; padding: 16px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 340px; border: 1px solid #e0e0e0; }
        #selector-group { display: flex; gap: 6px; margin-bottom: 8px; }
        #selector-group select { flex: 1; min-width: 0; padding: 8px 4px; border-radius: 4px; border: 1px solid #ccc; background: white; font-size: 12px; cursor: pointer; }

        .row { display: flex; gap: 6px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: 'Cascadia Code', 'Courier New', monospace; outline: none; }
        input:focus { border-color: #3498db; }

        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #2c3e50; color: white; font-weight: 600; font-size: 13px; }
        button:hover { background: #34495e; }

        .nav-btn { background: #3498db; flex: 1; }
        .cancel-btn { background: #95a5a6; }
        .nav-btn:disabled { background: #d5d8dc; cursor: not-allowed; }

        #status { text-align: center; font-size: 11px; color: #7f8c8d; font-weight: bold; margin-top: 12px; min-height: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        #status.error { color: #e74c3c; }

        #reset-ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        .reset-btn { background: #e74c3c; padding: 12px 20px; border-radius: 30px; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2); border:none; cursor:pointer;}

        #cy { width: 100vw; height: 100vh; z-index: 1; }

        /* Sidebar Overlay */
        #sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            bottom: 20px;
            background: rgba(30, 39, 46, 0.96);
            padding: 24px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: -4px 0 25px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            border-bottom: 2px solid #3498db;
            padding-bottom: 12px;
            margin-bottom: 5px;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            color: #ecf0f1;
            word-wrap: break-word;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            color: #3498db;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .node-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-box {
            background: #ffffff;
            color: #2c3e50;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            word-wrap: break-word;
            border-left: 4px solid #3498db;
        }

        .detail-row {
            font-size: 13px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
            gap: 4px;
        }

        .detail-label {
            color: #95a5a6;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .detail-value {
            color: #fff;
            font-family: 'Cascadia Code', monospace;
            word-wrap: break-word;
            font-size: 13px;
        }

        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Legend Styling */
        #legend { margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; }
        .legend-title { font-size: 10px; text-transform: uppercase; font-weight: 800; color: #95a5a6; margin-bottom: 10px; letter-spacing: 1px; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 8px; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #2c3e50; white-space: nowrap; }
        .symbol { width: 16px; height: 16px; flex-shrink: 0; box-sizing: border-box; }
        .diamond { transform: rotate(45deg); width: 12px; height: 12px; margin-left: 2px; }
        .square { border-radius: 2px; }
        .parent-box { border: 2px dashed #1e88e5; background: rgba(30, 136, 229, 0.1); }
    </style>
</head>
<body>
<div id="search-container">
    <div id="selector-group"></div>

    <div class="row">
        <input type="text" id="searchInput" placeholder="Regex (e.g. ^gen_.*_mm$)" onkeyup="if(event.key === 'Enter') runSearch()">
    </div>
    <div class="row">
        <button onclick="runSearch()">Search</button>
        <button class="cancel-btn" onclick="cancelSearch()">Cancel</button>
        <button class="nav-btn" id="prevBtn" onclick="moveFocus(-1)" disabled>←</button>
        <button class="nav-btn" id="nextBtn" onclick="moveFocus(1)" disabled>→</button>
    </div>

    <div id="legend">
        <div class="legend-title">Graph Legend</div>
        <div class="legend-grid">
            <div class="legend-item">
                <div class="symbol square" style="background: linear-gradient(to right, #3498db 0%, #3498db 25%, #ffffff 25%, #ffffff 100%); border: 1.5px solid #2c3e50;"></div>
                <span>Reads from NanoAOD</span>
            </div>
            <div class="legend-item">
                <div class="symbol square" style="background: linear-gradient(to right, #ffffff 0%, #ffffff 75%, #3498db 75%, #3498db 100%); border: 1.5px solid #2c3e50;"></div>
                <span>Writes to Ntuple</span>
            </div>
            <div class="legend-item">
                <div class="symbol diamond" style="background: #fff3e0; border: 1.5px solid #ff9800;"></div>
                <span>Filter</span>
            </div>
            <div class="legend-item">
                <div class="symbol square" style="border: 4px dashed #8e24aa; background: rgba(218, 112, 214, 0.15);"></div>
                <span>Vector</span>
            </div>
            <div class="legend-item">
                <div class="symbol parent-box"></div>
                <span>Group</span>
            </div>
        </div>
    </div>
    <div id="status"></div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <h2 id="sidebar-title">Family Name</h2>
    </div>
    <div id="sidebar-content"></div>
</div>

<div id="reset-ui"><button class="reset-btn" onclick="resetView()">Reset View</button></div>
<div id="cy"></div>
<script>
let cy;
let searchResults = [];
let currentIndex = -1;
let familyIndex = {};
let familyTypes = {};
let familyResults = [];
let metaData;

const CONFIG_URL = 'build/visualization/DAG_files.json?v=' + Date.now();

async function loadConfig() {
    const response = await fetch(CONFIG_URL);
    const config = await response.json();

    const container = document.getElementById('selector-group');
    container.innerHTML = '';

    const keys = ['era', 'sample', 'scope'];

    keys.forEach(key => {
        const select = document.createElement('select');
        select.id = `select-${key}`;

        config[key].forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.innerText = val;
            select.appendChild(opt);
        });

        select.onchange = switchDataset;
        container.appendChild(select);
    });

    switchDataset();
}

function switchDataset() {
    const era = document.getElementById('select-era').value;
    const sample = document.getElementById('select-sample').value;
    const scope = document.getElementById('select-scope').value;

    const filename = `CROWNelements_${era}_${sample}_${scope}`;
    initGraph(filename);
}

async function initGraph(fileName) {
    if (cy) cy.destroy();

    document.getElementById('status').innerText = "Loading " + fileName + "...";

    const response = await fetch(`build/visualization/${fileName}.json?v=${Date.now()}`);
    const DAGData = await response.json();

    const elementsData = DAGData.elementData;

    elementsData.forEach(e => {
        if (!e.data) throw new Error(`Missing data field`);
        if (!e.data.family) throw new Error(`Missing family`);
    });

    metaData = DAGData.metaData;

    familyIndex = Object.fromEntries(
        Object.entries(metaData.familyRegister).map(
            ([fam, obj]) => [fam, new Set(obj.members)]
        )
    );

    cy = cytoscape({
        container: document.getElementById('cy'),
        elements: elementsData,
        autoungrabify: true,
        wheelSensitivity: 0.15,
        style: [
            {
                selector: 'node',
                style: {
                    'label': 'data(label)',
                    'text-valign': 'center',
                    'background-color': '#ffffff',
                    'border-width': 1.5,
                    'border-color': '#2c3e50',
                    'shape': 'rectangle',
                    'width': 'label',
                    'height': 'label',
                    'padding': '12px',
                    'font-size': '11px',
                    'z-index': 10
                }
            },
            {
                selector: 'node[?is_in]',
                style: {
                    'background-fill': 'linear-gradient',
                    'background-gradient-stop-colors': '#3498db #3498db #ffffff #ffffff',
                    'background-gradient-stop-positions': '0 12 12 100',
                    'background-gradient-direction': 'to-right'
                }
            },
            {
                selector: 'node[?is_out]',
                style: {
                    'background-fill': 'linear-gradient',
                    'background-gradient-stop-colors': '#ffffff #ffffff #3498db #3498db',
                    'background-gradient-stop-positions': '0 88 88 100',
                    'background-gradient-direction': 'to-right'
                }
            },
            {
                selector: 'node[?is_in][?is_out]',
                style: {
                    'background-fill': 'linear-gradient',
                    'background-gradient-stop-colors': '#3498db #3498db #ffffff #ffffff #3498db #3498db',
                    'background-gradient-stop-positions': '0 12 12 88 88 100',
                    'background-gradient-direction': 'to-right'
                }
            },

            { selector: ':parent', style: { 'background-fill': 'solid', 'background-opacity': 0.1, 'background-color': '#1e88e5', 'border-color': '#1e88e5', 'border-style': 'dashed', 'border-width': 4, 'text-valign': 'top', 'padding': '20px', 'events': 'no' } },
            { selector: 'node[type="scope"]', style: { 'border-style': 'solid', 'border-width': 4, 'border-color': '#4a4a4a', 'background-color': '#d1d1d1', 'background-opacity': 0.2 } },
            { selector: 'node[type="vector"]', style: { 'border-style': 'dashed', 'border-width': 4, 'border-color': '#8e24aa', 'background-color': '#da70d6', 'background-opacity': 0.15 } },
            { selector: 'node[type="filter"]', style: { 'shape': 'diamond', 'background-color': '#fff3e0', 'border-color': '#ff9800' } },
            {
                selector: 'node[type="proxy"]',
                style: {
                    'label': 'data(label)',
                    'width': 'label',
                    'height': 'label',
                    'padding': 6,
                    'background-color': '#fff9c4',
                    'background-opacity': 1,
                    'border-width': 1.5,
                    'border-color': '#d4c96a',
                    'color': '#333',
                    'font-size': 10,
                    'text-valign': 'center',
                    'text-halign': 'center',
                    'text-wrap': 'wrap',
                    'text-max-width': 80,
                }
            },
            {
                selector: 'edge',
                style: {
                    'curve-style': 'unbundled-bezier',
                    'line-color': '#6e7070',
                    'width': 'data(width)',
                    'target-arrow-shape': 'none',
                }
            },
            { selector: 'edge[type="twig"]', style: { 'curve-style': 'bezier' } },
            { selector: 'edge[type="leaf"]', style: { 'curve-style': 'bezier', 'target-arrow-shape': 'triangle' } },
            { selector: 'node.highlighted', style: { 'background-color': '#9cea95', 'border-color': '#2e7d32', 'border-width': 3, 'z-index': 99 } },
            { selector: 'edge.highlighted', style: { 'line-color': '#2e7d32', 'target-arrow-color': '#2e7d32', 'width': 3, 'z-index': 99 } },
            { selector: 'node.activeFocus', style: { 'background-color': '#6ae35f', 'border-color': '#27ae60', 'color': '#000000', 'z-index': 1000 } },
            { selector: 'edge.activeFocus', style: { 'line-color': '#2ecc71', 'target-arrow-color': '#27ae60', 'target-arrow-shape': 'triangle', 'width': 4, 'z-index': 1001 } },
            {
                selector: 'nodenode[?is_in].highlighted',
                style: {
                    'background-gradient-stop-colors': '#3498db #3498db #9cea95 #9cea95',
                }
            },
            {
                selector: 'nodenode[?is_in].activeFocus',
                style: {
                    'background-gradient-stop-colors': '#3498db #3498db #6ae35f #6ae35f',
                }
            },
            {
                selector: 'nodenode[?is_out].highlighted',
                style: {
                    'background-gradient-stop-colors': '#9cea95 #9cea95 #3498db #3498db',
                }
            },
            {
                selector: 'nodenode[?is_out].activeFocus',
                style: {
                    'background-gradient-stop-colors': '#6ae35f #6ae35f #3498db #3498db',
                }
            },
            {
                selector: 'nodenode[?is_in][?is_out].highlighted',
                style: {
                    'background-gradient-stop-colors': '#3498db #3498db #9cea95 #9cea95 #3498db #3498db',
                }
            },
            {
                selector: 'nodenode[?is_in][?is_out].activeFocus',
                style: {
                    'background-gradient-stop-colors': '#3498db #3498db #6ae35f #6ae35f #3498db #3498db',
                }
            },
            {
                selector: ':parent.highlighted',
                style: {
                    'background-fill': 'solid',
                    'background-color': '#7af16f',
                    'background-opacity': 0.25
                }
            },
            {
                selector: ':parent.activeFocus',
                style: {
                    'background-fill': 'solid',
                    'background-color': '#2ecc71',
                    'background-opacity': 0.4
                }
            },
            {
                selector: 'node[type="proxy"].highlighted',
                style: {
                    'background-fill': 'solid',
                    'background-color': '#9cea95',
                    'border-color': '#2e7d32',
                    'color': '#000'
                }
            },
            {
                selector: 'node[type="proxy"].activeFocus',
                style: {
                    'background-fill': 'solid',
                    'background-color': '#6ae35f',
                    'border-color': '#27ae60',
                    'color': '#000'
                }
            },
        ],
        layout: {
            name: 'elk',
            elk: {
                    algorithm: 'layered',
                    direction: 'RIGHT',
                    hierarchyHandling: 'INCLUDE_CHILDREN',
                    nodeNodeBetweenLayers: '120',
                }
        }
    });

    setupInteractions();
    cancelSearch();
    document.getElementById('status').innerText = "";
}

function getFamilyCollection(el) {
    const fam = el.data('family');

    return cy.collection(
        [...familyIndex[fam]].map(id => cy.getElementById(id))
    );
}

function updateSidebar(familyEles, famName) {
    const sidebar = document.getElementById('sidebar');
    const sidebarTitle = document.getElementById('sidebar-title');
    const sidebarContent = document.getElementById('sidebar-content');

    sidebarTitle.innerText = famName;
    sidebarContent.innerHTML = '';

    if (familyTypes[famName] === 'edge') {
        let trueSources = new Set();
        let trueTargets = new Set();

        familyEles.edges().forEach(e => {
            const src = e.source();
            const tgt = e.target();

            if (!src.id().startsWith('proxy_')) trueSources.add(src);
            if (!tgt.id().startsWith('proxy_')) trueTargets.add(tgt);
        });

        let html = `<div class="sidebar-section"><div class="sidebar-subtitle">Source Node(s)</div><ul class="node-list">`;
        trueSources.forEach(s => {
            html += `<li><div class="detail-box">${s.data('label')}</div></li>`;
        });
        html += `</ul></div>`;

        html += `<div class="sidebar-section"><div class="sidebar-subtitle">Target Node(s)</div><ul class="node-list">`;
        trueTargets.forEach(t => {
            html += `<li><div class="detail-box">${t.data('label')}</div></li>`;
        });
        html += `</ul></div>`;

        sidebarContent.innerHTML = html;

    } else {
        let nodeDetails = familyEles.nodes().first();

        familyEles.nodes().forEach(n => {
            if (!n.id().startsWith('proxy_')) nodeDetails = n;
        });

        const data = nodeDetails.data();

        let html = `<div class="sidebar-section"><div class="sidebar-subtitle">Node Details</div>`;
        html += `<div class="detail-row"><span class="detail-label">Label</span><span class="detail-value">${data.label}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">${data.id}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">Parent</span><span class="detail-value">${data.parent}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${data.type}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">Input</span><span class="detail-value">${data.is_in}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">Output</span><span class="detail-value">${data.is_out}</span></div>`;
        html += `</div>`;

        sidebarContent.innerHTML = html;
    }

    sidebar.style.display = 'flex';
}

function setupInteractions() {
    cy.on('tap', 'node, edge', function(evt) {
        const el = evt.target;
        const fam = el.data('family');

        cy.elements().removeClass('activeFocus');

        const familyEles = getFamilyCollection(el);
        familyEles.addClass('activeFocus');

        updateSidebar(familyEles, fam);
    });

    cy.on('tap', function(evt) {
        if (evt.target === cy) {
            document.getElementById('sidebar').style.display = 'none';
            cy.elements().removeClass('activeFocus');
        }
    });
}

function cancelSearch() {
    document.getElementById('searchInput').value = '';
    cy.elements().removeClass('highlighted activeFocus');
    searchResults = [];
    familyResults = [];
    currentIndex = -1;
    document.getElementById('sidebar').style.display = 'none';
    updateUI();
}


function moveFocus(dir) {

    if (currentIndex >= 0) {
        familyResults[currentIndex].collection.removeClass('activeFocus');
    }

    currentIndex = (currentIndex + dir + familyResults.length) % familyResults.length;

    const { head, collection } = familyResults[currentIndex];

    collection.addClass('activeFocus');

    const focusEle = cy.getElementById(head);

    cy.animate({ center: { eles: focusEle }, zoom: 1.3, duration: 350 });

    updateSidebar(collection, focusEle.data('family'));
    updateUI();
}

function updateUI() {
    const count = familyResults.length;
    const input = document.getElementById('searchInput').value;
    const statusEl = document.getElementById('status');

    statusEl.innerText = input ? `${currentIndex + 1} / ${count}` : "";

    document.getElementById('prevBtn').disabled = count === 0;
    document.getElementById('nextBtn').disabled = count === 0;
}

function runSearch() {
    const query = document.getElementById('searchInput').value;
    const regex = new RegExp(query);

    cy.elements().removeClass('highlighted activeFocus');

    const matchedFamilies = new Set();

    cy.elements().forEach(el => {
        const label = el.data('label') || el.data('description') || '';
        if (regex.test(label)) {
            matchedFamilies.add(el.data('family'));
        }
    });

    familyResults = [...matchedFamilies].map(f => {
        const head = metaData.familyRegister[f].familyHead;
        const ids = familyIndex[f];

        return {
            head,
            collection: cy.collection(
                [...ids].map(id => cy.getElementById(id))
            )
        };
    });

    familyResults.forEach(col => col.collection.addClass('highlighted'));

    currentIndex = -1;
    moveFocus(1);
}

function resetView() {
    cy.animate({ fit: { padding: 40 }, duration: 500 });
}

window.onload = loadConfig;
</script>
</body>
</html>
