<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics Analysis Graph Explorer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-elk@2.1.0/dist/cytoscape-elk.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #fcfcfc; }

        /* UI Layer */
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: white; padding: 16px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 340px; border: 1px solid #e0e0e0; transition: height 0.3s; }

        /* Drop-down selectors */
        #selector-group { display: flex; gap: 6px; margin-bottom: 8px; }
        #selector-group select, #select-shift { flex: 1; min-width: 0; padding: 8px 4px; border-radius: 4px; border: 1px solid #ccc; background: white; font-size: 12px; cursor: pointer; }

        /* Search bar */
        .row { display: flex; gap: 6px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: 'Cascadia Code', 'Courier New', monospace; outline: none; }
        input:focus { border-color: #3498db; }

        /* Buttons */
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #2c3e50; color: white; font-weight: 600; font-size: 13px; }
        button:hover { background: #34495e; }

        .nav-btn { background: #3498db; flex: 1; }
        .cancel-btn { background: #95a5a6; }
        .nav-btn:disabled { background: #d5d8dc; cursor: not-allowed; }

        /* Status message */
        #status { text-align: center; font-size: 11px; color: #7f8c8d; font-weight: bold; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        #status.error { color: #e74c3c; }
        #status:empty { display: none; margin: 0; min-height: 0; }

        /* Global IO Dropdowns (Unified) */
        details.global-io-dropdown { margin-top: 12px; font-size: 11px; border: 1px solid #eee; border-radius: 4px; }
        details.global-io-dropdown summary { cursor: pointer; font-weight: bold; color: #2c3e50; padding: 8px; background: #ecf0f1; border-radius: 4px; outline: none; }
        details.global-io-dropdown[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: 1px solid #ddd; }
        .global-io-content { padding: 8px; background: white; max-height: 250px; overflow-y: auto; }

        /* Reset Button */
        #reset-ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        .reset-btn { background: #e74c3c; padding: 12px 20px; border-radius: 30px; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2); border:none; cursor:pointer;}

        /* Main Graph */
        #cy { width: 100vw; height: 100vh; z-index: 1; }

        /* Sidebar Overlay */
        #sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            bottom: 20px;
            background: rgba(30, 39, 46, 0.96);
            padding: 24px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: -4px 0 25px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            border-bottom: 2px solid #3498db;
            padding-bottom: 12px;
            margin-bottom: 5px;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            color: #ecf0f1;
            word-wrap: break-word;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .sidebar-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            color: #3498db;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .node-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-box {
            background: #ffffff;
            color: #2c3e50;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            word-wrap: break-word;
            border-left: 4px solid #3498db;
        }

        .simple-list {
            list-style-type: square;
            padding-left: 18px;
            margin: 0;
            color: #bdc3c7;
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            word-wrap: break-word;
        }
        .simple-list li {
            margin-bottom: 4px;
        }

        .detail-row {
            font-size: 13px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
            gap: 4px;
        }

        .detail-label {
            color: #95a5a6;
            font-size: 11px;
            font-weight: 700;
        }

        .detail-value {
            color: #fff;
            font-family: 'Cascadia Code', monospace;
            word-wrap: break-word;
            font-size: 13px;
        }

        .clickable {
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .clickable:hover {
            background: #e3f2fd !important;
            border-left-color: #1e88e5 !important;
            color: #0d47a1 !important;
        }

        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Legend Styling */
        #legend { margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; }
        .legend-title { font-size: 10px; text-transform: uppercase; font-weight: 800; color: #95a5a6; margin-bottom: 10px; letter-spacing: 1px; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 8px; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #2c3e50; white-space: nowrap; }
        .symbol { width: 16px; height: 16px; flex-shrink: 0; box-sizing: border-box; }
        .octagon {clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);}
        .square { border-radius: 2px; }
        .parent-box { border: 2px dashed #1e88e5; background: rgba(30, 136, 229, 0.1); }
    </style>
</head>
<body>
<div id="search-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin: 0; font-size: 14px; color: #2c3e50;">Controls</h3>
        <button id="toggle-ui-btn" onclick="toggleUI()" style="padding: 4px 8px; font-size: 11px; background: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7;">Hide</button>
    </div>

    <div id="ui-content">
        <div id="selector-group"></div>

        <div class="row" style="margin-top: 12px;">
            <input type="text" id="searchInput" placeholder="Regex (e.g. ^gen_.*_mm$)" onkeyup="if(event.key === 'Enter') runSearch()">
        </div>
        <div class="row">
            <button onclick="runSearch()">Search</button>
            <button class="cancel-btn" onclick="cancelSearch()">Cancel</button>
            <button class="nav-btn" id="prevBtn" onclick="moveFocus(-1)" disabled>←</button>
            <button class="nav-btn" id="nextBtn" onclick="moveFocus(1)" disabled>→</button>
        </div>

        <div class="row">
            <select id="select-shift" onchange="applyShift()">
                <option value="">No Shift Selection</option>
            </select>
        </div>

        <details class="global-io-dropdown">
            <summary>Input Quantities</summary>
            <div id="global-input-content" class="global-io-content"></div>
        </details>

        <details class="global-io-dropdown">
            <summary>Output Quantities</summary>
            <div id="global-output-content" class="global-io-content"></div>
        </details>

        <div id="legend">
            <div class="legend-title">Graph Legend</div>
            <div class="legend-grid">
                <div class="legend-item">
                    <div class="symbol square" style="background: linear-gradient(to right, #3498db 0%, #3498db 25%, #ffffff 25%, #ffffff 100%); border: 1.5px solid #2c3e50;"></div>
                    <span>Reads from NanoAOD</span>
                </div>
                <div class="legend-item">
                    <div class="symbol square" style="background: linear-gradient(to right, #d5db34 0%, #d5db34 25%, #ffffff 25%, #ffffff 100%); border: 1.5px solid #2c3e50;"></div>
                    <span>Reads from Ntuple</span>
                </div>
                <div class="legend-item">
                    <div class="symbol square" style="background: linear-gradient(to right, #ffffff 0%, #ffffff 75%, #3498db 75%, #3498db 100%); border: 1.5px solid #2c3e50;"></div>
                    <span>Writes to Ntuple</span>
                </div>
                <div class="legend-item">
                    <div class="symbol parent-box"></div>
                    <span>Group</span>
                </div>
                <div class="legend-item">
                    <div class="symbol octagon" style="background: #fac370; border: 1.5px solid #ffaa00;"></div>
                    <span>Filter</span>
                </div>
                <div class="legend-item">
                    <div class="symbol square" style="border: 4px dashed #8e24aa; background: rgba(218, 112, 214, 0.15);"></div>
                    <span>Vector</span>
                </div>
                <div class="legend-item">
                    <div class="symbol square" style="background: #f7a5f8; border: 1.5px solid #f84cfa;"></div>
                    <span>Unused Producer</span>
                </div>
            </div>
        </div>
        <div id="status"></div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <h2 id="sidebar-title">Family Name</h2>
    </div>
    <div id="sidebar-content"></div>
</div>

<div id="reset-ui"><button class="reset-btn" onclick="resetView()">Reset View</button></div>
<div id="cy"></div>

<script>
let cy;
let searchResults = [];
let currentIndex = -1;
let familyIndex = {};
let familyResults = [];
let metaData;
let globalIOData = { nanoIn: new Set(), ntupleIn: new Set(), ntupleOut: new Set() };

const CONFIG_URL = "build/visualization/DAG_files.json?v=" + Date.now();

// UI Toggle Function
function toggleUI() {
    const content = document.getElementById("ui-content");
    const btn = document.getElementById("toggle-ui-btn");
    if (content.style.display === "none") {
        content.style.display = "block";
        btn.innerText = "Hide";
    } else {
        content.style.display = "none";
        btn.innerText = "Show";
    }
}

// Unified helper to get the "Head" node for a family
function getFamilyHead(famName) {
    const isEdge = metaData.edgeFamilyRegister && metaData.edgeFamilyRegister[famName];
    const ids = familyIndex[famName];
    if (!ids) return null;
    
    if (isEdge) {
        const headId = [...ids].find(id => {
            const el = cy.getElementById(id);
            return el.length > 0 && el.data('source') && !el.data('source').startsWith('proxy');
        });
        return headId || [...ids][0];
    }
    return [...ids][0];
}

// Load config to fill drop-down menus
async function loadConfig() {
  const response = await fetch(CONFIG_URL);
  const config = await response.json();

  const container = document.getElementById("selector-group");
  container.innerHTML = "";

  const keys = ["era", "sample", "scope"];

  keys.forEach((key) => {
    const select = document.createElement("select");
    select.id = `select-${key}`;

    config[key].forEach((val) => {
      const opt = document.createElement("option");
      opt.value = val;
      opt.innerText = val;
      select.appendChild(opt);
    });
    select.onchange = switchDataset;
    container.appendChild(select);
  });

  switchDataset();
}

function switchDataset() {
  const era = document.getElementById("select-era").value;
  const sample = document.getElementById("select-sample").value;
  const scope = document.getElementById("select-scope").value;

  const filename = `CROWNelements_${era}_${sample}_${scope}`;
  initGraph(filename);
}

async function initGraph(fileName) {
  if (cy) cy.destroy();
  document.getElementById("status").innerText = "Loading " + fileName + "...";

  const response = await fetch(`build/visualization/${fileName}.json?v=${Date.now()}`);
  const DAGData = await response.json();

  metaData = DAGData; 
  familyIndex = {};
  globalIOData = { nanoIn: new Set(), ntupleIn: new Set(), ntupleOut: new Set() };
  const elementsData = [];

  // 1. HYDRATE REAL NODES directly from nodeFamilyRegister & Build Global I/O
  if (metaData.nodeFamilyRegister) {
      for (const [nodeId, meta] of Object.entries(metaData.nodeFamilyRegister)) {
          let is_in_str = "";
          if (meta.file_in) {
              if (meta.file_in.NanoAOD && meta.file_in.NanoAOD.length > 0) {
                  is_in_str += "NanoAOD ";
                  meta.file_in.NanoAOD.forEach(item => globalIOData.nanoIn.add(item));
              }
              if (meta.file_in.Ntuple && meta.file_in.Ntuple.length > 0) {
                  is_in_str += "Ntuple";
                  meta.file_in.Ntuple.forEach(item => globalIOData.ntupleIn.add(item));
              }
          }
          if (meta.file_out && meta.file_out.length > 0) {
              meta.file_out.forEach(item => globalIOData.ntupleOut.add(item));
          }

          elementsData.push({
              data: {
                  id: nodeId,
                  family: nodeId, 
                  label: meta.name || nodeId,
                  parent: meta.parent,
                  type: meta.type || "Producer",
                  is_in: is_in_str.trim(),
                  is_out: meta.file_out && meta.file_out.length > 0
              }
          });

          familyIndex[nodeId] = new Set([nodeId]);
      }
  }

  // Render the initial generic Global I/O Menu
  renderGlobalIO();

  // 2. HYDRATE PROXIES & EDGES from edgeFamilyRegister
  if (metaData.edgeFamilyRegister) {
      for (const [famId, famData] of Object.entries(metaData.edgeFamilyRegister)) {
          familyIndex[famId] = new Set();

          if (famData.nodes) {
              for (const [nodeId, nodeMeta] of Object.entries(famData.nodes)) {
                  elementsData.push({
                      data: {
                          id: nodeId,
                          family: famId,
                          label: famData.name || famId,
                          parent: nodeMeta.parent,
                          type: "proxy"
                      }
                  });
                  familyIndex[famId].add(nodeId);
              }
          }

          if (famData.edges) {
              for (const [edgeId, edgeMeta] of Object.entries(famData.edges)) {
                  elementsData.push({
                      data: {
                          id: edgeId,
                          family: famId,
                          description: famData.name || famId,
                          source: edgeMeta.source,
                          target: edgeMeta.target,
                          type: edgeMeta.type,
                          width: edgeMeta.width
                      }
                  });
                  familyIndex[famId].add(edgeId);
              }
          }
      }
  }

  cy = cytoscape({
    container: document.getElementById("cy"),
    elements: elementsData,
    autoungrabify: true,
    wheelSensitivity: 0.15,
    style: [
      {
        selector: "node",
        style: {
          label: "data(label)",
          "text-valign": "center",
          "background-color": "#ffffff",
          "border-width": 1.5,
          "border-color": "#2c3e50",
          shape: "rectangle",
          width: "label",
          height: "label",
          padding: "12px",
          "font-size": "11px",
          "z-index": 10,
        },
      },

      /* I/O Styles */
      {
        selector: "node[?is_out]",
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#ffffff #ffffff #3498db #3498db",
          "background-gradient-stop-positions": "0 85 85 100",
          "background-gradient-direction": "to-right",
        },
      },
      {
        selector: "node[is_in *= 'NanoAOD']",
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#3498db #3498db #ffffff #ffffff",
          "background-gradient-stop-positions": "0 15 15 100",
          "background-gradient-direction": "to-right",
        },
      },
      {
        selector: "node[is_in *= 'NanoAOD'][?is_out]",
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#3498db #3498db #ffffff #ffffff #3498db #3498db",
          "background-gradient-stop-positions": "0 15 15 85 85 100",
          "background-gradient-direction": "to-right",
        },
      },
      {
        selector: 'node[is_in *= "Ntuple"]',
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#d5db34 #d5db34 #ffffff #ffffff",
          "background-gradient-stop-positions": "0 15 15 100",
          "background-gradient-direction": "to-right",
        },
      },
      {
        selector: 'node[is_in *= "Ntuple"][?is_out]',
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#d5db34 #d5db34 #ffffff #ffffff #3498db #3498db",
          "background-gradient-stop-positions": "0 15 15 85 85 100",
          "background-gradient-direction": "to-right",
        },
      },
      {
        selector: 'node[is_in *= "NanoAOD"][is_in *= "Ntuple"]',
        style: {
          "background-fill": "linear-gradient",
          "background-gradient-stop-colors": "#3498db #3498db #d5db34 #d5db34 #ffffff #ffffff",
          "background-gradient-stop-positions": "0 7.5 7.5 15 15 100",
          "background-gradient-direction": "to-right",
        },
      },

      /* Group styles */
      {
        selector: ":parent",
        style: {
          "background-fill": "solid",
          "background-opacity": 0.1,
          "background-color": "#1e88e5",
          "border-color": "#1e88e5",
          "border-style": "dashed",
          "border-width": 4,
          "text-valign": "top",
          padding: "20px",
          events: "no",
        },
      },
      {
        selector: 'node[type="scope"]',
        style: {
          "border-style": "solid",
          "border-width": 4,
          "border-color": "#4a4a4a",
          "background-color": "#d1d1d1",
          "background-opacity": 0.2,
        },
      },
      {
        selector: 'node[type="vector"]',
        style: {
          "border-style": "dashed",
          "border-width": 4,
          "border-color": "#8e24aa",
          "background-color": "#da70d6",
          "background-opacity": 0.15,
        },
      },

      /* Filter Colors Overrides */
      {
        selector: 'node[type="filter"]',
        style: { shape: "octagon", "background-color": "#fac370", "border-color": "#ffaa00" },
      },
      {
        selector: 'node[type="filter"][?is_in], node[type="filter"][is_in *= "NanoAOD"]',
        style: { "background-gradient-stop-colors": "#3498db #3498db #fac370 #fac370" },
      },
      {
        selector: 'node[type="filter"][is_in *= "Ntuple"]',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #fac370 #fac370" },
      },

      /* Stump Colors Overrides */
      {
        selector: 'node[type="stump"]',
        style: { "background-color": "#f7a5f8", "border-color": "#f84cfa" },
      },
      {
        selector: 'node[type="stump"][is_in *= "NanoAOD"]',
        style: { "background-gradient-stop-colors": "#3498db #3498db #f7a5f8 #f7a5f8" },
      },
      {
        selector: 'node[type="stump"][is_in *= "Ntuple"]',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #f7a5f8 #f7a5f8" },
      },

      /* Proxy Styles */
      {
        selector: 'node[type="proxy"]',
        style: {
          label: "data(label)",
          width: "label",
          height: "label",
          padding: 6,
          "background-color": "#fff9c4",
          "background-opacity": 1,
          "border-width": 1.5,
          "border-color": "#d4c96a",
          color: "#333",
          "font-size": 10,
          "text-valign": "center",
          "text-halign": "center",
          "text-wrap": "wrap",
          "text-max-width": 80,
        },
      },
      
      /* Shift Overrides for node interior. Overrides basic styles, overwritten by highlighting and search. */
      { selector: "node.shift-affected", style: { "background-color": "#f6b1ac"} },
      { selector: "node[?is_out].shift-affected", style: { "background-gradient-stop-colors": "#f6b1ac #f6b1ac #3498db #3498db" } },
      { selector: "node[is_in *= 'NanoAOD'].shift-affected", style: { "background-gradient-stop-colors": "#3498db #3498db #f6b1ac #f6b1ac" } },
      { selector: "node[is_in *= 'NanoAOD'][?is_out].shift-affected", style: { "background-gradient-stop-colors": "#3498db #3498db #f6b1ac #f6b1ac #3498db #3498db" } },
      { selector: "node[is_in *= 'Ntuple'].shift-affected", style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #f6b1ac #f6b1ac" } },
      { selector: "node[is_in *= 'Ntuple'][?is_out].shift-affected", style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #f6b1ac #f6b1ac #3498db #3498db" } },

      { selector: "node.shift-head", style: { "background-color": "#ec6d5f"} },
      { selector: "node[?is_out].shift-head", style: { "background-gradient-stop-colors": "#ec6d5f #ec6d5f #3498db #3498db" } },
      { selector: "node[is_in *= 'NanoAOD'].shift-head", style: { "background-gradient-stop-colors": "#3498db #3498db #ec6d5f #ec6d5f" } },
      { selector: "node[is_in *= 'NanoAOD'][?is_out].shift-head", style: { "background-gradient-stop-colors": "#3498db #3498db #ec6d5f #ec6d5f #3498db #3498db" } },
      { selector: "node[is_in *= 'Ntuple'].shift-head", style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #ec6d5f #ec6d5f" } },
      { selector: "node[is_in *= 'Ntuple'][?is_out].shift-head", style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #ec6d5f #ec6d5f #3498db #3498db" } },

      /* Edges */
      {
        selector: "edge",
        style: {
          "curve-style": "unbundled-bezier",
          "line-color": "#6e7070",
          width: "data(width)",
          "target-arrow-shape": "none",
        },
      },
      { selector: 'edge[type="twig"]', style: { "curve-style": "bezier" } },
      { selector: 'edge[type="leaf"]', style: { "curve-style": "bezier", "target-arrow-shape": "triangle" }, },

      /* Search Highlight (Muted Green) - Overridden by activeFocus below */
      {
        selector: "node.highlighted",
        style: { "background-color": "#9cea95", "border-color": "#2e7d32", "border-width": 3, "z-index": 99 }
      },
      {
        selector: "edge.highlighted",
        style: { "line-color": "#2e7d32", "target-arrow-color": "#2e7d32", "width": 3, "z-index": 99 }
      },

      /* Active Focus (Vibrant Green) Gradients Overrides */
      {
        selector: "node[?is_out].highlighted",
        style: { "background-gradient-stop-colors": "#9cea95 #9cea95 #3498db #3498db" }
      },
      {
        selector: "node[is_in *= 'NanoAOD'].highlighted",
        style: { "background-gradient-stop-colors": "#3498db #3498db #9cea95 #9cea95" }
      },
      {
        selector: "node[is_in *= 'NanoAOD'][?is_out].highlighted",
        style: { "background-gradient-stop-colors": "#3498db #3498db #9cea95 #9cea95 #3498db #3498db" }
      },
      {
        selector: 'node[is_in *= "Ntuple"].highlighted',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #9cea95 #9cea95" }
      },
      {
        selector: 'node[is_in *= "Ntuple"][?is_out].highlighted',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #9cea95 #9cea95 #3498db #3498db" }
      },
      {
        selector: 'node[is_in *= "NanoAOD"][is_in *= "Ntuple"].highlighted',
        style: { "background-gradient-stop-colors": "#3498db #3498db #d5db34 #d5db34 #9cea95 #9cea95" }
      },

      /* User Selection (Active Focus - Solid Green) */
      {
        selector: "node.activeFocus",
        style: { "background-color": "#6ae35f", "border-color": "#2ecc71", "border-width": 4, "color": "#000000", "z-index": 1000 }
      },
      {
        selector: "edge.activeFocus",
        style: { "line-color": "#2ecc71", "target-arrow-color": "#2ecc71", "target-arrow-shape": "triangle", "width": 4, "z-index": 1001 }
      },

      /* Active Focus Gradients Overrides */
      {
        selector: "node[?is_out].activeFocus",
        style: { "background-gradient-stop-colors": "#6ae35f #6ae35f #3498db #3498db" }
      },
      {
        selector: "node[is_in *= 'NanoAOD'].activeFocus",
        style: { "background-gradient-stop-colors": "#3498db #3498db #6ae35f #6ae35f" }
      },
      {
        selector: "node[is_in *= 'NanoAOD'][?is_out].activeFocus",
        style: { "background-gradient-stop-colors": "#3498db #3498db #6ae35f #6ae35f #3498db #3498db" }
      },
      {
        selector: 'node[is_in *= "Ntuple"].activeFocus',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #6ae35f #6ae35f" }
      },
      {
        selector: 'node[is_in *= "Ntuple"][?is_out].activeFocus',
        style: { "background-gradient-stop-colors": "#d5db34 #d5db34 #6ae35f #6ae35f #3498db #3498db" }
      },
      {
        selector: 'node[is_in *= "NanoAOD"][is_in *= "Ntuple"].activeFocus',
        style: { "background-gradient-stop-colors": "#3498db #3498db #d5db34 #d5db34 #6ae35f #6ae35f" }
      },

      /* Shift Overrides for node borders and edges. Overrides everything else. */
      { selector: "node.shift-affected", style: {"border-color": "#e74c3c", "border-width": 2.5 } },
      { selector: "edge.shift-affected", style: { "line-color": "#e74c3c", "target-arrow-color": "#e74c3c", "width": 3, "z-index": 50 } },
      { selector: "node.shift-head", style: {"border-color": "#c0392b", "border-width": 4, "z-index": 60 } },
      { selector: "edge.shift-head", style: { "line-color": "#c0392b", "target-arrow-color": "#c0392b", "width": 4, "z-index": 60 } },
    ],
    layout: {
      name: "elk",
      elk: {
        algorithm: "layered",
        direction: "RIGHT",
        hierarchyHandling: "INCLUDE_CHILDREN",
        nodeNodeBetweenLayers: "120",
      },
    },
  });

  populateShiftDropdown();
  setupInteractions();
  cancelSearch();
  document.getElementById("status").innerText = "";
}

function renderGlobalIO(affectedOutputs = new Set()) {
    const createListHTML = (title, itemsSet, checkForHighlight) => {
        if (itemsSet.size === 0) return "";
        let listHTML = `<div style="color:#3498db; font-weight:800; text-transform:uppercase; margin-top:8px; margin-bottom:4px;">${title}</div>
                        <ul style="margin: 0; padding-left: 20px; color: #2c3e50;">`;
        Array.from(itemsSet).sort().forEach(item => {
            const isAffected = checkForHighlight && affectedOutputs.has(item);
            if (isAffected) {
                listHTML += `<li style="color: #e74c3c; font-weight: bold;">${item}</li>`;
            } else {
                listHTML += `<li>${item}</li>`;
            }
        });
        listHTML += `</ul>`;
        return listHTML;
    };

    const container_in = document.getElementById("global-input-content");
    const container_out = document.getElementById("global-output-content");
    let html_in = "";
    let html_out = "";

    html_in += createListHTML("Reads from NanoAOD", globalIOData.nanoIn, false);
    html_in += createListHTML("Reads from Ntuple", globalIOData.ntupleIn, false);
    html_out += createListHTML("Writes to Ntuple", globalIOData.ntupleOut, true);

    container_in.innerHTML = html_in;
    container_out.innerHTML = html_out;
}

function populateShiftDropdown() {
  const shiftSelect = document.getElementById("select-shift");
  shiftSelect.innerHTML = '<option value="">No Shift Selection</option>';
  
  if (metaData && metaData.shiftRegistry) {
      Object.keys(metaData.shiftRegistry).forEach(shiftName => {
          const opt = document.createElement("option");
          opt.value = shiftName;
          opt.innerText = shiftName;
          shiftSelect.appendChild(opt);
      });
  }
}

function applyShift() {
  // Clear previous shifts
  cy.elements().removeClass("shift-head shift-affected");
  const shiftName = document.getElementById("select-shift").value;
  let affectedOuts = new Set();
  
  if (!shiftName || !metaData.shiftRegistry || !metaData.shiftRegistry[shiftName]) {
      // Restore default state, clear IO highlights, refresh sidebar
      const activeEle = cy.elements(".activeFocus").first();
      if (activeEle.length > 0) updateSidebar(cy.elements(".activeFocus"), activeEle.data("family"));
      renderGlobalIO(affectedOuts);
      return;
  }

  const shiftData = metaData.shiftRegistry[shiftName];
  let headEles = cy.collection();

  // 1. Identify Head elements via O(1) collection filter
  if (shiftData.heads) {
      shiftData.heads.forEach(headFam => {
          const ids = familyIndex[headFam];
          if (ids) {
              headEles = headEles.union(cy.filter(ele => ids.has(ele.id())));
          } else {
             const el = cy.getElementById(headFam);
             if (el.length > 0) headEles = headEles.union(el);
          }
      });
  }

  // 2. Apply styles, gather downstream nodes, and extract outputs
  if (headEles.length > 0) {
      headEles.addClass("shift-head");
      const affectedEles = headEles.successors();
      affectedEles.addClass("shift-affected");

      // Extract all file_out variables for the Global I/O Red Highlight
      const allShiftedEles = headEles.union(affectedEles);
      allShiftedEles.nodes().forEach(n => {
          const famInfo = metaData.nodeFamilyRegister[n.data('family')];
          if (famInfo && famInfo.file_out) {
              famInfo.file_out.forEach(o => affectedOuts.add(o));
          }
      });
      
      // Jump to first headNode
      cy.animate({ center: { eles: headEles[0] }, zoom: 1.3, duration: 350 });
  }

  // 3. Reload sidebar for existing selection to show shifted values
  const activeEle = cy.elements(".activeFocus").first();
  if (activeEle.length > 0) {
      updateSidebar(cy.elements(".activeFocus"), activeEle.data("family"));
  }

  // 4. Highlight the Output Quantities list
  renderGlobalIO(affectedOuts);
}

function updateSidebar(familyEles, famName) {
  const sidebarContent = document.getElementById("sidebar-content");

  const isEdge = metaData.edgeFamilyRegister && metaData.edgeFamilyRegister[famName];
  const isNode = metaData.nodeFamilyRegister && metaData.nodeFamilyRegister[famName];

  if (!isEdge && !isNode && !familyIndex[famName]) {
      throw new Error("Family not found in registers or index: " + famName);
  }

  const headId = getFamilyHead(famName);
  const headNode = cy.getElementById(headId);
  if (headNode.length === 0) throw new Error("Head element missing from cytoscape graph: " + headId);

  const headData = headNode.data();

  document.getElementById("sidebar-title").innerText = headData.label || headData.description || famName;
  sidebarContent.innerHTML = "";

  let html = ``;

  const type = headData.type === "proxy" ? null : (headData.type || "Producer");

  if (type) {
    html += `<div class="sidebar-section">
                <span style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; font-weight: 700; display: inline-block; width: max-content;">
                  Type: ${type}
                </span>
            </div>`;
  }

  if (isEdge) {
    let sourceFams = new Set();
    let targetFams = new Set();

    familyEles.edges().forEach(e => {
      if (!e.source().id().startsWith("proxy_")) sourceFams.add(e.source().data("family"));
      if (!e.target().id().startsWith("proxy_")) targetFams.add(e.target().data("family"));
    });

    html += renderFamilyLinkList("Quantity source", sourceFams);
    html += renderFamilyLinkList("Quantity targets", targetFams);

  } else {
    if (headData.parent) {
        const parentNode = cy.getElementById(headData.parent);
        if (parentNode.length > 0) {
            const parentFam = parentNode.data("family") || headData.parent;
            html += renderFamilyLinkList("Parent", new Set([parentFam]));
        }
    }
    const famInfo = isNode ? metaData.nodeFamilyRegister[famName] : null;

    // Shift Diff Validation Check
    const activeShiftName = document.getElementById("select-shift").value;
    const activeShift = activeShiftName ? metaData.shiftRegistry[activeShiftName] : null;
    const isHeadOfActiveShift = headNode.hasClass("shift-head"); 

    if (famInfo && famInfo.node_call) {
        html += `<div class="sidebar-section">`;
        html += `<div class="sidebar-subtitle">Producer Call</div>`;
        html += `<div class="detail-row"><span class="detail-value" style="color: #3498db;">${famInfo.node_call}</span></div>`;
        html += `</div>`;

        if (famInfo.node_call_configs && Object.keys(famInfo.node_call_configs).length > 0) {
            html += `<div class="sidebar-section">
                      <div class="sidebar-subtitle">Producer configs</div>`;

            for (let [key, val] of Object.entries(famInfo.node_call_configs)) {
                let displayVal = typeof val === 'object' ? JSON.stringify(val) : val;

                // Shift Delta Formatting
                if (isHeadOfActiveShift && activeShift && activeShift.shift_configs && key in activeShift.shift_configs) {
                    const newVal = activeShift.shift_configs[key];
                    const displayNew = typeof newVal === 'object' ? JSON.stringify(newVal) : newVal;

                    displayVal = `
                        <div style="display: flex; flex-direction: column; gap: 2px;">
                            <span style="text-decoration: line-through; color: #7f8c8d; font-size: 0.95em;">${displayVal}</span>
                            <div style="color: #e74c3c; font-weight: bold; display: flex; align-items: center; gap: 8px;">
                                <span style="font-size: 1.2em;">&#10142;</span> 
                                <span>${displayNew}</span>
                            </div>
                        </div>`;
                }

                html += `<div class="detail-row">
                          <span class="detail-label">${key}</span>
                          <span class="detail-value">${displayVal}</span>
                        </div>`;
            }
            html += `</div>`;
        }
    }

    let inFams = new Set(), outFams = new Set();
    headNode.connectedEdges().forEach(e => {
      const edgeFam = e.data("family");
      if (e.target().id() === headNode.id()) {
        inFams.add(edgeFam);
      } else {
        outFams.add(edgeFam);
      }
    });

    html += renderFamilyLinkList("Required Quantities", inFams);
    html += renderFamilyLinkList("Produced Quantities", outFams);

    if (famInfo) {
        if (famInfo.file_in && (famInfo.file_in.NanoAOD?.length > 0 || famInfo.file_in.Ntuple?.length > 0)) {
            html += `<div class="sidebar-section">
                        <div class="sidebar-subtitle">Reads from file</div>`;
            if (famInfo.file_in.NanoAOD && famInfo.file_in.NanoAOD.length > 0) {
                html += renderSubList("NanoAOD", new Set(famInfo.file_in.NanoAOD));
            }
            if (famInfo.file_in.Ntuple && famInfo.file_in.Ntuple.length > 0) {
                html += renderSubList("Ntuple", new Set(famInfo.file_in.Ntuple));
            }
            html += `</div>`;
        }

        if (famInfo.file_out && famInfo.file_out.length > 0) {
            html += `<div class="sidebar-section">
                        <div class="sidebar-subtitle">Writes to file</div>
                        ${renderSubList("Ntuple", new Set(famInfo.file_out))}
                     </div>`;
        }
    }
  }

  sidebarContent.innerHTML = html;
  document.getElementById("sidebar").style.display = "flex";
}

function renderFamilyLinkList(title, famSet) {
  if (famSet.size === 0) return "";

  let html = `<div class="sidebar-section">
                <div class="sidebar-subtitle">${title}</div>
                <ul class="node-list">`;

  const sortedFams = Array.from(famSet).sort((a, b) => {
    const nameA = getDisplayName(a);
    const nameB = getDisplayName(b);
    return nameA.localeCompare(nameB);
  });

  sortedFams.forEach(f => {
    const dName = getDisplayName(f);
    html += `<li><div class="detail-box clickable" onclick="focusFamily('${f}')">${dName}</div></li>`;
  });

  html += `</ul></div>`;
  return html;
}

function renderSubList(title, set) {
  if (set.size === 0) return "";
  let html = `<div style="margin-top: 4px;"><div class="detail-label" style="color: #bdc3c7; margin-bottom: 2px;">${title}</div><ul class="simple-list">`;
  Array.from(set).sort().forEach(l => html += `<li>${l}</li>`);
  return html + `</ul></div>`;
}

function setupInteractions() {
  cy.on("tap", "node, edge", function (evt) {
    focusFamily(evt.target.data("family"));
  });

  cy.on("tap", function (evt) {
    if (evt.target === cy) {
      document.getElementById("sidebar").style.display = "none";
      cy.elements().removeClass("activeFocus");
    }
  });
}

function moveFocus(dir) {
  if (familyResults.length === 0) return;

  currentIndex = (currentIndex + dir + familyResults.length) % familyResults.length;
  focusFamily(familyResults[currentIndex].famName);
}

function cancelSearch() {
  document.getElementById("searchInput").value = "";
  cy.elements().removeClass("highlighted activeFocus");
  searchResults = [];
  familyResults = [];
  currentIndex = -1;
  document.getElementById("sidebar").style.display = "none";
  updateUI();
}

function focusFamily(famName) {
  const ids = familyIndex[famName];
  if (!ids) throw new Error("No IDs mapped in index for family: " + famName);

  cy.elements().removeClass("activeFocus");
  
  // Fast Set filter instead of array.map mapping
  const collection = cy.filter(ele => ids.has(ele.id()));
  collection.addClass("activeFocus");

  const headId = getFamilyHead(famName);
  const headEle = cy.getElementById(headId);
  if (headEle.length > 0) {
      cy.animate({ center: { eles: headEle }, zoom: 1.3, duration: 350 });
  }

  updateSidebar(collection, famName);

  const searchIdx = familyResults.findIndex(res => res.famName === famName);
  if (searchIdx !== -1) {
    currentIndex = searchIdx;
    updateUI();
  }
}

function updateUI() {
  const count = familyResults.length;
  const input = document.getElementById("searchInput").value;
  const statusEl = document.getElementById("status");

  statusEl.innerText = input ? `${currentIndex + 1} / ${count}` : "";

  document.getElementById("prevBtn").disabled = count === 0;
  document.getElementById("nextBtn").disabled = count === 0;
}

function getDisplayName(famName) {
  const edgeInfo = metaData.edgeFamilyRegister?.[famName];
  if (edgeInfo) {
      return edgeInfo.name || famName;
  }

  const nodeInfo = metaData.nodeFamilyRegister?.[famName];
  if (nodeInfo) {
      return nodeInfo.name || famName;
  }

  return famName;
}

function runSearch() {
  const query = document.getElementById("searchInput").value;
  if (!query) {
    cancelSearch();
    return;
  }

  const regex = new RegExp(query);
  cy.elements().removeClass("highlighted activeFocus");

  const matchedFamilies = new Set();

  cy.elements().forEach((el) => {
    const label = el.data("label") || el.data("description") || "";
    if (regex.test(label)) matchedFamilies.add(el.data("family"));
  });

  if (metaData && metaData.nodeFamilyRegister) {
    for (const [famName, famInfo] of Object.entries(metaData.nodeFamilyRegister)) {
      if (famInfo.node_call && regex.test(famInfo.node_call)) {
        matchedFamilies.add(famName);
        continue;
      }

      if (famInfo.file_in) {
        const allIn = [...(famInfo.file_in.NanoAOD || []), ...(famInfo.file_in.Ntuple || [])];
        if (allIn.some(val => regex.test(val))) {
          matchedFamilies.add(famName);
          continue;
        }
      }

      if (famInfo.file_out && famInfo.file_out.some(val => regex.test(val))) {
        matchedFamilies.add(famName);
        continue;
      }
    }
  }

  familyResults = [...matchedFamilies].map((f) => ({ famName: f }));
  
  // Fast Collection Addition
  const highlightSet = new Set();
  familyResults.forEach((res) => {
      if (familyIndex[res.famName]) {
          familyIndex[res.famName].forEach(id => highlightSet.add(id));
      }
  });

  if (highlightSet.size > 0) {
      cy.filter(ele => highlightSet.has(ele.id())).addClass("highlighted");
      currentIndex = -1;
      moveFocus(1);
  } else {
      currentIndex = -1;
      updateUI();
  }
}

function resetView() {
  cy.animate({ fit: { padding: 40 }, duration: 500 });
}

window.onload = loadConfig;

</script>
